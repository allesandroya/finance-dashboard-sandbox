<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#16A34A" />
  <title>inputIn — Halaman tidak ditemukan</title>
  <link rel="icon" type="image/png" href="/assets/inputin-icon.png" />
  <script>
    // Catch-all for the legacy /app/ path. GitHub Pages serves this 404.html
    // for any unknown URL, so any /app/<anything> bounces to /<anything>.
    (function () {
      var p = location.pathname || '/';
      var m = p.match(/^\/app(\/.*)?$/);
      if (m) {
        var rest = m[1] || '/';
        location.replace(rest + location.search + location.hash);
      }
    })();
  </script>
  <style>
    html, body { margin: 0; padding: 0; background: #F8FAFC; color: #0F172A; font-family: -apple-system, Segoe UI, Roboto, sans-serif; }
    .wrap { min-height: 100vh; display: grid; place-items: center; padding: 24px; }
    .box  { text-align: center; max-width: 420px; }
    .logo { width: 64px; height: 64px; border-radius: 16px; overflow: hidden; display: inline-block; margin-bottom: 16px; box-shadow: 0 6px 20px rgba(15,23,42,0.08); }
    .logo img { width: 100%; height: 100%; display: block; }
    h1 { margin: 0 0 4px; font-size: 56px; font-weight: 800; letter-spacing: -1px; }
    h2 { margin: 0 0 12px; font-size: 16px; font-weight: 600; color: #475569; }
    p  { margin: 0 0 18px; color: #64748B; font-size: 14px; line-height: 1.6; }
    a  { display: inline-block; background: #16A34A; color: #fff; padding: 10px 18px; border-radius: 999px; font-weight: 600; text-decoration: none; }
    a:hover { filter: brightness(1.05); }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="box">
      <div class="logo"><img src="/assets/inputin-icon.png" alt="inputIn" /></div>
      <h1>404</h1>
      <h2>Halaman tidak ditemukan</h2>
      <p>Link yang kamu buka tidak ada. Mungkin sudah dipindahkan atau salah ketik.</p>
      <a href="/">Kembali ke inputIn</a>
    </div>
  </div>
</body>
</html>
